[tox]
envlist = py39, py310, py311
isolated_build = True

[testenv]
extras = dev  # Install development dependencies from pyproject.toml
allowlist_externals =
    curl
    bash
    tar
    mkdir
commands_pre =
    # Install Helm if not present
    bash -c 'if ! command -v helm &> /dev/null; then \
        curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 && \
        chmod 700 get_helm.sh && \
        ./get_helm.sh && \
        rm get_helm.sh; \
    fi'
commands =
    # Run integration tests
    pytest -v {posargs:tests/integration} --cov=helm_values_manager --cov-report=xml --cov-report=term-missing
